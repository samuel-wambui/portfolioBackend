spring.application.name=portfolio
server.port=${SERVER_PORT:8080}


spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

debug=false
logging.level.root=INFO
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=INFO
logging.level.org.springframework.boot.autoconfigure.logging.ConditionEvaluationReportLogger=OFF

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,https://protfolio-frontend-liard.vercel.app}

app.jwt.secret=${APP_JWT_SECRET:cG9ydGZvbGlvLWp3dC1zZWNyZXQtc2hvdWxkLWJlLWNoYW5nZWQ=}
app.jwt.access-token-ttl-ms=${APP_JWT_ACCESS_TOKEN_TTL_MS:900000}
app.jwt.refresh-token-ttl-ms=${APP_JWT_REFRESH_TOKEN_TTL_MS:604800000}

app.secrets.encryption-key=${APP_SECRETS_ENCRYPTION_KEY:${APP_JWT_SECRET:cG9ydGZvbGlvLWNyZWRlbnRpYWwtZW5jcnlwdGlvbi1rZXk=}}
app.openai.api-key=${OPENAI_API_KEY:${APP_OPENAI_API_KEY:}}
app.openai.embeddings-url=${APP_OPENAI_EMBEDDINGS_URL:https://api.openai.com/v1/embeddings}
app.openai.embedding-model=${APP_OPENAI_EMBEDDING_MODEL:text-embedding-3-small}
app.openai.embedding-dimensions=${APP_OPENAI_EMBEDDING_DIMENSIONS:1536}

app.portfolio-agent.n8n.ask-webhook-url=${N8N_PORTFOLIO_AGENT_ASK_WEBHOOK_URL:https://n8n.digitalbank365.com/webhook/portfolio-agent-ask}
app.portfolio-agent.n8n.reindex-webhook-url=${N8N_PORTFOLIO_AGENT_REINDEX_WEBHOOK_URL:https://n8n.digitalbank365.com/webhook/portfolio-agent-reindex}

# SMTP server configuration
